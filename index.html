<!DOCTYPE html>
<html lang="ro">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plan Sală Nuntă - 24 Mai 2026</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8d49a;
      --gold-dark: #8a6a1f;
      --cream: #faf6ef;
      --cream-dark: #f0e8d8;
      --brown: #5c3d1e;
      --brown-light: #8b6340;
      --text: #2d1f0e;
      --muted: #9a7d5a;
      --white: #fff;
      --chair-empty: #e8d49a;
      --chair-filled: #c9a84c;
      --chair-border: #8a6a1f;
      --sidebar-w: 360px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--cream);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--white);
      border-right: 1px solid var(--gold-light);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--cream-dark);
      background: var(--cream);
    }

    #sidebar-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--brown);
      letter-spacing: 0.04em;
    }

    #sidebar-header p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    #table-info {
      padding: 16px 24px 12px;
      border-bottom: 1px solid var(--cream-dark);
    }

    #table-info h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--gold-dark);
      margin-bottom: 4px;
    }

    #table-info p {
      font-size: 12px;
      color: var(--muted);
    }

    #seats-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    #seats-list::-webkit-scrollbar {
      width: 4px;
    }

    #seats-list::-webkit-scrollbar-thumb {
      background: var(--gold-light);
      border-radius: 2px;
    }

    .seat-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      margin-bottom: 6px;
      background: var(--cream);
      border: 1px solid var(--cream-dark);
    }

    .seat-item.head-seat {
      background: #fff9ee;
      border-color: var(--gold-light);
    }

    .seat-num {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--gold);
      color: var(--white);
      font-size: 11px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .seat-num.head {
      background: var(--brown);
    }

    .seat-name {
      flex: 1;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      color: var(--text);
      padding: 2px 0;
    }

    .seat-name.empty {
      color: var(--muted);
      font-style: italic;
    }

    .seat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    /* ── CANVAS ── */
    #canvas {
      flex: 1;
      overflow: auto;
      position: relative;
      padding: 20px;
    }

    #hall {
      position: relative;
      width: 1000px;
      margin: 0 auto;
      background: var(--white);
      border: 2px solid var(--gold-light);
      border-radius: 12px;
      box-shadow: 0 4px 40px rgba(140, 100, 40, .08);
    }

    /* ── ZONES: DJ, PHOTO, CANDY ── */
    .zone {
      position: absolute;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      font-size: 11px;
      letter-spacing: .07em;
      text-transform: uppercase;
      font-weight: 500;
      gap: 6px;
      line-height: 1;
    }

    .zone-icon {
      font-size: 22px;
    }

    #zone-intrare-top {
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      height: 28px;
      background: var(--cream-dark);
      color: var(--brown);
      border: 1px dashed var(--gold);
      font-size: 11px;
      flex-direction: row;
    }

    #zone-intrare-top .zone-icon {
      font-size: 14px;
    }

    #zone-dj {
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      width: 320px;
      height: 80px;
      background: var(--brown);
      color: #e8d49a;
      border: 1.5px solid var(--gold-dark);
      font-size: 13px;
    }

    /* Vertical zones: each letter is a separate span in a column */
    .zone.vertical {
      flex-direction: column;
      gap: 2px;
      letter-spacing: 0;
    }

    .zone.vertical .word-gap {
      height: 6px;
    }

    #zone-photo {
      top: 150px;
      left: 14px;
      width: 60px;
      height: 200px;
      background: var(--cream-dark);
      color: var(--brown);
      border: 1px dashed var(--gold);
    }

    /* Right side, vertical strip along M7-M8 */
    #zone-candy-right {
      top: 380px;
      right: 14px;
      width: 60px;
      height: 200px;
      background: var(--cream-dark);
      color: var(--brown);
      border: 1px dashed var(--gold);
    }

    /* Right side, between M8-M9 (entrance) */
    #zone-intrare-right {
      top: 680px;
      right: 14px;
      width: 60px;
      height: 100px;
      background: var(--cream-dark);
      color: var(--brown);
      border: 1px dashed var(--gold);
    }

    /* Left side, where Masa 5 used to be */
    #zone-barmobil {
      top: 1080px;
      left: 14px;
      width: 60px;
      height: 150px;
      background: var(--cream-dark);
      color: var(--brown);
      border: 1px dashed var(--gold);
    }

    /* Bottom edge, full width, behind head table */
    #zone-bucatarie {
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40px;
      background: var(--brown);
      color: var(--gold-light);
      border-top: 1.5px solid var(--gold-dark);
      border-radius: 0 0 10px 10px;
      flex-direction: row;
      gap: 8px;
      font-size: 13px;
    }

    #zone-bucatarie .zone-icon {
      font-size: 18px;
    }

    /* ── HEAD TABLE (Bride & Groom) ── */
    #head-table {
      position: absolute;
      bottom: 65px;
      left: 50%;
      transform: translateX(-50%);
      width: 620px;
      cursor: pointer;
    }

    .head-table-label {
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-style: italic;
      color: var(--gold-dark);
      margin-bottom: 36px;
      letter-spacing: .08em;
    }

    .head-table-label::before,
    .head-table-label::after {
      content: '✦';
      color: var(--gold);
      margin: 0 10px;
      font-size: 12px;
    }

    .head-table-section {
      background: linear-gradient(180deg, #fff9ee 0%, var(--cream) 100%);
      border: 2px solid var(--gold);
      border-radius: 12px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: border-color .2s;
    }

    .head-table-section:hover,
    .head-table-section.selected {
      border-color: var(--gold-dark);
      box-shadow: 0 0 0 3px var(--gold-light);
    }

    .head-table-section .table-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--brown);
      letter-spacing: .04em;
      text-align: center;
    }

    .head-table-section .table-sub {
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: .05em;
      margin-top: 2px;
    }

    /* ── TABLES ── */
    .table-wrap {
      position: absolute;
      cursor: pointer;
    }

    .table-rect {
      background: var(--cream);
      border: 1.5px solid var(--gold);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .2s, background .2s;
      position: relative;
      z-index: 2;
    }

    .table-rect:hover,
    .table-wrap.selected .table-rect {
      background: #fff9ee;
      border-color: var(--gold-dark);
    }

    .table-wrap.selected .table-rect {
      box-shadow: 0 0 0 3px var(--gold-light);
    }

    .table-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--brown);
      text-align: center;
      line-height: 1.3;
      pointer-events: none;
      user-select: none;
    }

    .table-count {
      font-size: 10px;
      color: var(--muted);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      display: block;
    }

    /* Chairs with initials */
    .chair {
      position: absolute;
      width: 44px;
      height: 22px;
      border-radius: 4px;
      background: var(--chair-empty);
      border: 1px solid var(--chair-border);
      transition: background .2s;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      font-weight: 500;
      color: var(--brown);
      letter-spacing: -.02em;
      overflow: hidden;
      pointer-events: none;
      user-select: none;
      padding: 0 2px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chair.filled {
      background: var(--chair-filled);
      color: var(--white);
    }

    .chair.head-chair {
      width: 40px;
      height: 30px;
      background: var(--brown);
      border-color: var(--brown);
      color: var(--gold-light);
      font-size: 8px;
    }

    .chair.head-chair.filled {
      background: var(--gold-dark);
      color: var(--white);
    }

    /* Wheat stem */
    .stem {
      position: absolute;
      background: var(--gold-light);
      z-index: 0;
    }

    /* Legend */
    #legend {
      position: absolute;
      top: 130px;
      right: 24px;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: rgba(255, 255, 255, .9);
      border: 1px solid var(--cream-dark);
      border-radius: 8px;
      padding: 10px 12px;
      z-index: 5;
    }

    .leg-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .leg-box {
      width: 16px;
      height: 12px;
      border-radius: 2px;
      border: 1px solid var(--chair-border);
    }

    #progress-bar {
      height: 3px;
      background: var(--gold-light);
      border-radius: 2px;
      margin: 8px 0 0;
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      background: var(--gold);
      border-radius: 2px;
      transition: width .3s;
    }

    #progress-text {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ──────────────────────────────────────────── */
    /*  MOBILE — only viewing, no editing           */
    /* ──────────────────────────────────────────── */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
        overflow: visible;
      }

      #sidebar {
        width: 100%;
        min-width: 0;
        max-width: 100%;
        order: 2;
        border-right: none;
        border-top: 1px solid var(--gold-light);
        height: auto;
        overflow: visible;
      }

      #canvas {
        order: 1;
        width: 100%;
        height: auto;
        overflow-x: auto;
        overflow-y: visible;
        padding: 12px 8px;
        -webkit-overflow-scrolling: touch;
      }

      #hall {
        margin: 0;
        box-shadow: none;
      }

      /* Force-hide all editing affordances */
      .seat-item input {
        pointer-events: none;
        background: transparent;
        font-size: 14px;
        color: var(--text);
      }

      .seat-item {
        padding: 12px 14px;
        cursor: default;
      }

      #seats-list {
        flex: none;
        max-height: none;
        overflow: visible;
        padding: 10px 14px 24px;
      }

      #sidebar-header h1 {
        font-size: 19px;
      }

      #sidebar-header p {
        font-size: 11px;
      }

      /* Hide legend - takes up space, info is in chair colors anyway */
      #legend {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>Plan Sală Nuntă</h1>
      <p>24 Mai 2026 &nbsp;·&nbsp; 86 invitați</p>
      <div id="progress-bar">
        <div id="progress-fill" style="width:0%"></div>
      </div>
      <div id="progress-text">0 / 86 locuri</div>
    </div>
    <div id="table-info">
      <h2 id="info-title">Selectează o masă</h2>
      <p id="info-sub">Apasă pe oricare masă din sală pentru a vedea invitații</p>
    </div>
    <div id="seats-list"></div>
  </div>

  <!-- HALL CANVAS -->
  <div id="canvas">
    <div id="hall">
      <div class="zone" id="zone-intrare-top">
        <span class="zone-icon"> </span>Intrare / Ieșire
      </div>
      <div class="zone" id="zone-photo">
        <span class="zone-icon"> </span>Photo Corner
      </div>
      <div class="zone" id="zone-dj">
        <span class="zone-icon"> </span>DJ
      </div>
      <div class="zone" id="zone-candy-right">
        <span class="zone-icon"> </span>Candy Bar
      </div>
      <div class="zone" id="zone-intrare-right">
        <span class="zone-icon"> </span>Intrare / Ieșire
      </div>
      <div class="zone" id="zone-barmobil">
        <span class="zone-icon"> </span>Bar
      </div>
      <div class="zone" id="zone-bucatarie">
        <span class="zone-icon"> </span>Bucătărie
      </div>

      <div id="legend">
        <div class="leg-row">
          <div class="leg-box" style="background:var(--chair-empty)"></div> Loc liber
        </div>
        <div class="leg-row">
          <div class="leg-box" style="background:var(--chair-filled)"></div> Loc ocupat
        </div>
        <div class="leg-row">
          <div class="leg-box" style="background:var(--brown)"></div> Capăt masă
        </div>
      </div>

      <div id="tables-container"></div>

      <div id="head-table" onclick="selectTable('head')">
        <div class="head-table-label">Masa de Prezidiu</div>
        <div class="head-table-section" id="head-table-rect">
          <div style="text-align:center;">
            <div class="table-name">Masa 11 &nbsp;·&nbsp; Miri &amp; Nași</div>
            <div class="table-sub">5 locuri</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>

    let _resizeTimer;
    let _wasMobile = isMobileView();
    window.addEventListener('resize', () => {
      clearTimeout(_resizeTimer);
      _resizeTimer = setTimeout(() => {
        const nowMobile = isMobileView();
        if (nowMobile !== _wasMobile) {
          _wasMobile = nowMobile;
        }
      }, 200);
    });

    // ────────────────────────────────────────────────
    // DATA
    // ────────────────────────────────────────────────
    const TABLES = [
      {
        id: 1, name: 'Masa 1', seats: 8, headSeat: false,
        guests: ['Griggs Rose', 'Williams Aimee', 'Pleșcan Maria', 'Pleșcan Alberto', 'Sara', 'Avarvarei Ina', 'Acasandrei Iuliana', 'Moldovanu Ionuț']
      },
      {
        id: 2, name: 'Masa 2', seats: 8, headSeat: false,
        guests: ['Luchian Ion', 'Luchian Lili', 'Romaniuc Larisa', 'Romaniuc Ovidiu', 'Sandu Aurel', 'Sandu Elena', 'Iacob Anca', 'Iacob Dumitru']
      },
      {
        id: 3, name: 'Masa 3', seats: 8, headSeat: false,
        guests: ['Grecu Grigore', 'Grecu Dana', 'Antaluca-Grecu Nina', 'Antaluca-Grecu Gabriel', 'Grecu Ticu', 'Grecu Maria', 'Grecu Marina', 'Burcă Bogdan']
      },
      {
        id: 4, name: 'Masa 4 + 5', seats: 17, headSeat: true, customWidth: 380,
        guests: [
          'Ivanov Petru', 'Ivanov Ana', 'Alexa Ioachim', 'Alexa Domnica',
          'Petraș Mădălina', 'Grecu Adrian', 'Kurth Tobias', 'Wegener Irina',
          'Grecu Nadia', 'Timofte Daria', 'Timofte Valentin', 'Varvarici Claudia',
          'Varvarici Cristi', 'Toanchină Ioana', 'Fiedler Mihaela', 'Wegener Tatiana',
          // Head seat last
          'Grecu Ilie'
        ]
      },
      {
        id: 6, name: 'Masa 6', seats: 8, headSeat: false,
        guests: ['Iordache Mircea', 'Iordache Georgiana', 'Chirițoiu Bianca', 'Chirițoiu Nelu', 'Ivanov Vlad', 'Ivanov Laura', 'Ene Andreea', 'Ene Adi']
      },
      {
        id: 7, name: 'Masa 7', seats: 8, headSeat: false,
        guests: ['Crâșmăruc Ionuț', 'Crâșmăruc Roxana', 'Anastasia', 'Crâșmăruc Elena', 'Rotaru Matei', 'Rotaru Tatiana', 'Petcu Bianca', 'Chelaru Maria']
      },
      {
        id: 8, name: 'Masa 8', seats: 8, headSeat: false,
        guests: ['Cotia Anca', 'Antonia', 'Hurjui Andreea', 'Hurjui Ionuț', 'Unguru Roxana', 'Mathias', 'Cotia Andreea', 'Cotia Claudiu']
      },
      {
        id: 9, name: 'Masa 9', seats: 8, headSeat: false,
        guests: ['Rotaru Mihai', 'Rotaru Angela', 'Bălan Ana', 'Hurjui Maricica', 'Cotia Petru', 'Cotia Gabriela', 'Vasile Monica', 'Vasile David']
      },
      {
        id: 10, name: 'Masa 10', seats: 8, headSeat: false,
        guests: ['Negoiță Walter', 'Negoiță Cristina', 'Negoiță Jana', 'Negoiță Truță', 'Negoiță Alex', 'Negoiță Denisa', 'Stanciu Mariana', 'Stanciu Sorin']
      },
    ];
    const HEAD_TABLE = {
      id: 'head', name: 'Masa 11 · Miri & Nași', seats: 5, headSeat: false,
      guests: ['Negoiță Irinel', 'Crâșmăruc Gabriel', 'Chloe', 'Crâșmăruc Andreea', 'Negoiță Alina']
    };

    function getGuests(id) {
      if (id === 'head') return [...HEAD_TABLE.guests];
      const table = TABLES.find(t => t.id === id);
      return table ? [...table.guests] : null;
    }

    function isMobileView() {
      return window.innerWidth <= 768;
    }

    function getChairLabel(name) {
      if (isMobileView()) {
        return String((idx ?? 0) + 1);
      }

      if (!name || !name.trim()) return '';
      const parts = name.trim().split(/\s+/);
      // Romanian convention: "LastName FirstName" → display as "FirstName L."
      if (parts.length === 1) return parts[0];
      // First part = last name, second part = first name → swap and abbreviate last
      const lastName = parts[0];
      const firstName = parts.slice(1).join(' ');
      return `${firstName} ${lastName[0]}.`;
    }

    // ────────────────────────────────────────────────
    // WHEAT SPIKE LAYOUT
    // Pairs side-by-side: (1,6) (2,7) (3,8) (4,9) (5,10)
    // ────────────────────────────────────────────────
    const HALL_W = 1000;
    const TABLE_W = 200;
    const TABLE_H = 64;
    const CHAIR_W = 44;
    const CHAIR_H = 22;
    const CHAIR_GAP = 4;

    const CX = HALL_W / 2;
    const Y_START = 200;
    const ROW_STEP = 240;
    const ANGLE_DEG = -28;
    const SPINE_OFFSET = 120;

    const tableRows = [
      { left: 0, right: 4 },   // M1, M6
      { left: 1, right: 5 },   // M2, M7
      { left: 2, right: 6 },   // M3, M8
      { left: 3, right: 7 },   // M4+5 merged, M9
      { left: null, right: 8 },// BarMobil zone (left), M10 (right)
    ];

    function getTablePos(side, rowIdx, tableW) {
      const w = tableW || TABLE_W;
      const y = Y_START + rowIdx * ROW_STEP;
      const angle = side === 'left' ? -ANGLE_DEG : ANGLE_DEG;
      // Wider tables get shifted slightly toward center so they fit in the hall
      const extraShift = Math.max(0, (w - TABLE_W) / 3);
      const cx = side === 'left'
        ? CX - SPINE_OFFSET - w / 2 + 10 + extraShift
        : CX + SPINE_OFFSET + w / 2 - 10 - extraShift;
      return { cx, cy: y, angle };
    }

    // ────────────────────────────────────────────────
    // RENDER
    // ────────────────────────────────────────────────
    const container = document.getElementById('tables-container');

    function renderAll() {
      container.innerHTML = '';

      const totalHeight = Y_START + (tableRows.length - 1) * ROW_STEP + 100;

      // Decorative wheat stem
      const spine = document.createElement('div');
      spine.className = 'stem';
      spine.style.cssText = `left:${CX - 1}px; top:140px; width:2px; height:${totalHeight - 90}px;`;
      container.appendChild(spine);

      tableRows.forEach((row, rowIdx) => {
        ['left', 'right'].forEach(side => {
          if (row[side] === null || row[side] === undefined) return;
          const table = TABLES[row[side]];
          renderTable(table, side, rowIdx);
        });
      });

      renderHeadTableChairs();
      updateProgress();

      const hall = document.getElementById('hall');
      hall.style.minHeight = (totalHeight + 280) + 'px';
    }

    function renderTable(table, side, rowIdx) {
      const tableW = table.customWidth || TABLE_W;
      const { cx, cy, angle } = getTablePos(side, rowIdx, tableW);
      const guests = getGuests(table.id) || [...table.guests];

      const wrap = document.createElement('div');
      wrap.className = 'table-wrap';
      wrap.id = `table-${table.id}`;
      wrap.style.cssText = `
    width:${tableW}px; height:${TABLE_H}px;
    left:${cx - tableW / 2}px;
    top:${cy - TABLE_H / 2}px;
    transform-origin: center center;
    transform: rotate(${angle}deg);
  `;
      wrap.onclick = (e) => { e.stopPropagation(); selectTable(table.id); };

      const rect = document.createElement('div');
      rect.className = 'table-rect';
      rect.style.cssText = `width:100%;height:100%;`;
      rect.innerHTML = `<div class="table-name">${table.name}<span class="table-count">${table.seats} pers.</span></div>`;
      wrap.appendChild(rect);

      // Head chair at INTERIOR end of table (toward spine)
      if (table.headSeat) {
        const head = document.createElement('div');
        head.className = 'chair head-chair';
        const headX = side === 'left' ? -34 : tableW - 6;
        head.style.cssText = `left:${headX}px; top:${TABLE_H / 2 - 15}px;`;
        const headIdx = table.seats - 1;
        if (guests[headIdx] && guests[headIdx].trim()) head.classList.add('filled');
        head.textContent = getChairLabel(guests[headIdx] || '', headIdx);
        wrap.appendChild(head);
      }

      // Regular chairs along long edges
      const regularSeats = table.headSeat ? table.seats - 1 : table.seats;
      const perSide = Math.ceil(regularSeats / 2);
      const totalW = perSide * (CHAIR_W + CHAIR_GAP) - CHAIR_GAP;
      const startX = (tableW - totalW) / 2;

      for (let i = 0; i < regularSeats; i++) {
        const chair = document.createElement('div');
        chair.className = 'chair';
        const col = i % perSide;
        const row = Math.floor(i / perSide);
        const gx = startX + col * (CHAIR_W + CHAIR_GAP);
        const gy = row === 0 ? -CHAIR_H - 4 : TABLE_H + 4;
        chair.style.cssText = `left:${gx}px; top:${gy}px;`;
        if (guests[i] && guests[i].trim()) chair.classList.add('filled');
        chair.textContent = getChairLabel(guests[i] || '', i);
        wrap.appendChild(chair);
      }

      container.appendChild(wrap);
    }

    function renderHeadTableChairs() {
      const headTableEl = document.getElementById('head-table-rect');
      if (!headTableEl) return;
      headTableEl.querySelectorAll('.chair').forEach(c => c.remove());

      const guests = getGuests('head') || [...HEAD_TABLE.guests];
      const pW = 620;
      const totalW = HEAD_TABLE.seats * (CHAIR_W + CHAIR_GAP) - CHAIR_GAP;
      const startX = (pW - totalW) / 2;

      for (let i = 0; i < HEAD_TABLE.seats; i++) {
        const chair = document.createElement('div');
        chair.className = 'chair';
        const gx = startX + i * (CHAIR_W + CHAIR_GAP);
        chair.style.cssText = `position:absolute; left:${gx}px; top:-28px;`;
        if (guests[i] && guests[i].trim()) chair.classList.add('filled');
        chair.textContent = getChairLabel(guests[i] || '', i);
        headTableEl.appendChild(chair);
      }
    }

    // ────────────────────────────────────────────────
    // SIDEBAR
    // ────────────────────────────────────────────────
    let currentTable = null;

    function selectTable(id) {
      document.querySelectorAll('.table-wrap').forEach(el => el.classList.remove('selected'));
      document.getElementById('head-table-rect').classList.remove('selected');

      if (id === 'head') {
        document.getElementById('head-table-rect').classList.add('selected');
      } else {
        const el = document.getElementById(`table-${id}`);
        if (el) el.classList.add('selected');
      }
      currentTable = id;

      const table = id === 'head' ? HEAD_TABLE : TABLES.find(t => t.id === id);
      if (!table) return;
      const guests = getGuests(id) || [...table.guests];

      document.getElementById('info-title').textContent = table.name;
      document.getElementById('info-sub').textContent =
        `${table.seats} locuri${table.headSeat ? ' · 1 capăt de masă' : ''}`;

      const list = document.getElementById('seats-list');
      list.innerHTML = '';

      const regularSeats = table.headSeat ? table.seats - 1 : table.seats;

      for (let i = 0; i < table.seats; i++) {
        const isHead = table.headSeat && i === table.seats - 1;
        const item = document.createElement('div');
        item.className = 'seat-item' + (isHead ? ' head-seat' : '');

        const num = document.createElement('div');
        num.className = 'seat-num' + (isHead ? ' head' : '');
        num.textContent = isHead ? '↔' : (i + 1);

        const name = document.createElement('div');
        name.className = 'seat-name';
        name.textContent = guests[i] || '—';
        if (!guests[i] || !guests[i].trim()) name.classList.add('empty');

        const lbl = document.createElement('span');
        lbl.className = 'seat-label';
        lbl.textContent = isHead ? 'capăt' : (i < Math.ceil(regularSeats / 2) ? 'sus' : 'jos');

        item.appendChild(num);
        item.appendChild(name);
        item.appendChild(lbl);
        list.appendChild(item);
      }
    }

    // ────────────────────────────────────────────────
    // PROGRESS
    // ────────────────────────────────────────────────
    function updateProgress() {
      let filled = 0; let total = 0;
      [...TABLES, HEAD_TABLE].forEach(t => {
        const g = t.guests;
        total += t.seats;
        filled += g.filter(x => x && x.trim()).length;
      });
      document.getElementById('progress-fill').style.width = (filled / total * 100) + '%';
      document.getElementById('progress-text').textContent = `${filled} / ${total} locuri`;
    }

    window.addEventListener('load', () => {
      renderAll();
      selectTable(1);
    });
  </script>
</body>

</html>
